# =============================================================================
# Cucumber / JUnit Platform — configuração central
# =============================================================================

# Pacotes onde o Cucumber procura @Given/@When/@Then e Hooks
cucumber.glue=br.com.ddamasceno.steps.advantageShopping,\
              br.com.ddamasceno.steps.google,\
              br.com.ddamasceno.core

# Relatório JSON consumido pelo maven-cucumber-reporting
cucumber.plugin=json:target/reports/CucumberReports.json,\
                pretty

# Tag padrão quando nenhum perfil Maven ou -D é passado
# Sobrescrito por: mvn test -Dcucumber.filter.tags="@outraTag"
#             ou:  mvn test -P smoke|regression|ci|local
cucumber.filter.tags=@loginInvalidPassword

# Nomenclatura de snippets gerados
cucumber.snippet-type=camelcase

# Suprime saída de publicação Cucumber Cloud
cucumber.publish.quiet=true
