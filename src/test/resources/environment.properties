# =============================================================================
# Configurações de ambiente de execução
#
# browser.headless=false  →  abre o navegador local (uso em desenvolvimento)
# browser.headless=true   →  modo headless, sem interface (uso em CI/servidor)
#
# Sobrescrição via system property:  -Dbrowser.headless=true
# Sobrescrição via variável de ambiente:  BROWSER_HEADLESS=true
# =============================================================================

browser.headless=false
