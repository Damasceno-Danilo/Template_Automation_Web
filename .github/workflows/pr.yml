name: PR — Smoke Tests

on:
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    name: "Smoke Tests (PR Validation)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configurar dados de teste
        env:
          TEST_USER_VALID:      ${{ secrets.TEST_USER_VALID }}
          TEST_PASSWORD_VALID:  ${{ secrets.TEST_PASSWORD_VALID }}
          TEST_USER_INVALID:    ${{ secrets.TEST_USER_INVALID }}
          TEST_PASSWORD_INVALID: ${{ secrets.TEST_PASSWORD_INVALID }}
        run: |
          cat > src/test/resources/test-data.properties <<EOF
          test.user.valid=${TEST_USER_VALID}
          test.password.valid=${TEST_PASSWORD_VALID}
          test.user.invalid=${TEST_USER_INVALID}
          test.password.invalid=${TEST_PASSWORD_INVALID}
          EOF

      - name: Executar smoke tests
        run: mvn verify -P smoke --no-transfer-progress

      - name: Upload relatório do PR
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-smoke-report-${{ github.run_number }}
          path: target/cucumber-html-reports/
          retention-days: 7
