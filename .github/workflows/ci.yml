name: CI — Regression Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  # Permite execução manual com escolha de perfil
  workflow_dispatch:
    inputs:
      maven_profile:
        description: "Perfil Maven a executar (smoke | regression | ci)"
        required: false
        default: "ci"
      tags:
        description: "Tags Cucumber a executar (ex: @smoke)"
        required: false
        default: ""


jobs:
  test:
    name: "Automated Tests (${{ github.event.inputs.maven_profile || 'ci' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout do código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Java 17 com cache Maven
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Cria test-data.properties a partir de secrets (não expõe no log)
      - name: Configurar dados de teste
        env:
          TEST_USER_VALID:     ${{ secrets.TEST_USER_VALID }}
          TEST_PASSWORD_VALID: ${{ secrets.TEST_PASSWORD_VALID }}
          TEST_USER_INVALID:   ${{ secrets.TEST_USER_INVALID }}
          TEST_PASSWORD_INVALID: ${{ secrets.TEST_PASSWORD_INVALID }}
        run: |
          cat > src/test/resources/test-data.properties <<EOF
          test.user.valid=${TEST_USER_VALID}
          test.password.valid=${TEST_PASSWORD_VALID}
          test.user.invalid=${TEST_USER_INVALID}
          test.password.invalid=${TEST_PASSWORD_INVALID}
          EOF

      # 4. Executa os testes com o perfil selecionado
      #    Os secrets são passados como -D para garantir prioridade máxima no
      #    TestDataConfig (system property > variável de ambiente > arquivo)
      #
      #    Se o input "tags" (workflow_dispatch) for preenchido, ele sobrescreve
      #    a tag padrão do perfil Maven via -Dcucumber.tags — CLI -D tem
      #    precedência sobre a property definida no <profile> do pom.xml.
      - name: Executar testes
        env:
          TEST_USER_VALID:       ${{ secrets.TEST_USER_VALID }}
          TEST_PASSWORD_VALID:   ${{ secrets.TEST_PASSWORD_VALID }}
          TEST_USER_INVALID:     ${{ secrets.TEST_USER_INVALID }}
          TEST_PASSWORD_INVALID: ${{ secrets.TEST_PASSWORD_INVALID }}
          TAGS_INPUT: ${{ github.event.inputs.tags }}
        run: |
          PROFILE="${{ github.event.inputs.maven_profile || 'ci' }}"

          TAGS_ARG=()
          if [ -n "$TAGS_INPUT" ]; then
            echo "Sobrescrevendo tags do perfil '$PROFILE' com: $TAGS_INPUT"
            TAGS_ARG=(-Dcucumber.tags="$TAGS_INPUT")
          fi

          mvn test -P "$PROFILE" --no-transfer-progress \
            "${TAGS_ARG[@]}" \
            -Dtest.user.valid="${TEST_USER_VALID}" \
            -Dtest.password.valid="${TEST_PASSWORD_VALID}" \
            -Dtest.user.invalid="${TEST_USER_INVALID}" \
            -Dtest.password.invalid="${TEST_PASSWORD_INVALID}"

      # 4.1 DIAGNOSTICO TEMPORARIO - investigar ausencia do JSON no runner Linux
      # TODO: remover este step assim que a causa raiz for identificada e corrigida
      - name: "DIAGNOSTICO - listar target apos testes"
        if: always()
        run: |
          echo "=== arvore de diretorios em target/ ==="
          find target -maxdepth 3 -type d 2>&1
          echo ""
          echo "=== qualquer .json em target/ ==="
          find target -iname "*.json" 2>&1
          echo ""
          echo "=== conteudo de target/reports ==="
          ls -la target/reports 2>&1 || echo "DIRETORIO target/reports NAO EXISTE"
          echo ""
          echo "=== conteudo de target/ (raiz) ==="
          ls -la target 2>&1

      # 4.2 Gera o relatorio HTML (separado do "Executar testes" para nao mascarar o diagnostico acima)
      #     -DskipTests pula a re-execucao do surefire, so roda ate a fase verify
      - name: Gerar relatorio HTML
        if: always()
        run: mvn verify -P "${{ github.event.inputs.maven_profile || 'ci' }}" --no-transfer-progress -DskipTests
        continue-on-error: true

      # 5. Upload do relatório HTML (disponível por 30 dias na aba Actions)
      - name: Upload relatório HTML
        if: always()   # executa mesmo se os testes falharem
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report-${{ github.run_number }}
          path: target/cucumber-html-reports/
          retention-days: 30

      # 6. Upload das evidências PDF
      - name: Upload evidências PDF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-pdf-${{ github.run_number }}
          path: src/evidencias/
          retention-days: 30

      # 7. Publica resumo no GitHub Actions
      - name: Publicar resumo
        if: always()
        run: |
          echo "## Resultado dos Testes 🧪" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Perfil | \`${{ github.event.inputs.maven_profile || 'ci' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags (override manual) | \`${{ github.event.inputs.tags || '(nenhuma — usou tag padrão do perfil)' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Relatório completo disponível nos **Artifacts** desta execução." >> $GITHUB_STEP_SUMMARY
